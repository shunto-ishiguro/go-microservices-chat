syntax = "proto3";

package user.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service UserService {
  // Register / Login / Refresh: 認証フロー (画面 #1, #2)
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/register"
      body: "*"
    };
  }

  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/login"
      body: "*"
    };
  }

  rpc Refresh(RefreshRequest) returns (RefreshResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/refresh"
      body: "*"
    };
  }

  // GetMe / UpdateMe: 自分のプロフィール (画面 #7)
  //   呼び出し元 ID は x-user-id メタデータから解決する。
  rpc GetMe(GetMeRequest) returns (GetMeResponse) {
    option (google.api.http) = {
      get: "/api/v1/users/me"
    };
  }

  rpc UpdateMe(UpdateMeRequest) returns (UpdateMeResponse) {
    option (google.api.http) = {
      put: "/api/v1/users/me"
      body: "*"
    };
  }

  // GetUser: 他ユーザー 1 件のプロフィール取得 (画面 #8 メンバー詳細モーダル)
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (google.api.http) = {
      get: "/api/v1/users/{user_id}"
    };
  }

  // BatchGetUsers: 他ユーザー N 件を 1 回で取得 (内部 RPC、REST 非公開)
  //   chat-service がメンバー一覧 enrich で使う (N+1 回避のためのバッチ)。
  rpc BatchGetUsers(BatchGetUsersRequest) returns (BatchGetUsersResponse);
}

message User {
  string id = 1;
  string email = 2;
  string username = 3;
  string display_name = 4;
  string avatar_url = 5;
  string status_text = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message RegisterRequest {
  string email = 1;
  string username = 2;
  string display_name = 3;
  string password = 4;
}

message RegisterResponse {
  User user = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message GetMeRequest {}

message GetMeResponse {
  User user = 1;
}

message UpdateMeRequest {
  optional string display_name = 1;
  optional string avatar_url = 2;
  optional string status_text = 3;
}

message UpdateMeResponse {
  User user = 1;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message BatchGetUsersRequest {
  repeated string user_ids = 1;
}

message BatchGetUsersResponse {
  // 入力 user_ids と同じ順で返す。存在しない ID は欠落する (エラーにはしない)。
  repeated User users = 1;
}

syntax = "proto3";

package chat.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service ChatService {
  rpc CreateRoom(CreateRoomRequest) returns (CreateRoomResponse) {
    option (google.api.http) = {
      post: "/api/v1/rooms"
      body: "*"
    };
  }

  rpc GetRoom(GetRoomRequest) returns (GetRoomResponse) {
    option (google.api.http) = {
      get: "/api/v1/rooms/{room_id}"
    };
  }

  rpc ListRooms(ListRoomsRequest) returns (ListRoomsResponse) {
    option (google.api.http) = {
      get: "/api/v1/rooms"
    };
  }

  rpc SearchRooms(SearchRoomsRequest) returns (SearchRoomsResponse) {
    option (google.api.http) = {
      get: "/api/v1/rooms/search"
    };
  }

  rpc JoinRoom(JoinRoomRequest) returns (JoinRoomResponse) {
    option (google.api.http) = {
      post: "/api/v1/rooms/{room_id}/join"
      body: "*"
    };
  }

  rpc LeaveRoom(LeaveRoomRequest) returns (LeaveRoomResponse) {
    option (google.api.http) = {
      delete: "/api/v1/rooms/{room_id}/members/me"
    };
  }

  // ListRoomMembers: ルームのメンバー一覧 (画面 #9)
  //   chat-service 内部で user-service.BatchGetUsers を呼び display_name/avatar_url を enrich する。
  rpc ListRoomMembers(ListRoomMembersRequest) returns (ListRoomMembersResponse) {
    option (google.api.http) = {
      get: "/api/v1/rooms/{room_id}/members"
    };
  }

  // SendMessage: ルームへメッセージを永続化する (内部 RPC、REST 非公開)。
  //   realtime-service が WebSocket 受信時に chat-service へ書き込み依頼する経路。
  //   配信は Redis Pub/Sub で別ルート、SendMessage は永続化専任。
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);

  // GetMessages: ルームのメッセージ履歴を新しい順に返す (画面 #6 の初期表示 / 過去ログスクロール)。
  //   cursor-based pagination。空ルームでも 200 を返す。
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse) {
    option (google.api.http) = {
      get: "/api/v1/rooms/{room_id}/messages"
    };
  }
}

message Room {
  string id = 1;
  string name = 2;
  string created_by = 3;
  int32 member_count = 4;
  google.protobuf.Timestamp created_at = 5;
  // メンバー一覧はここには載せない。ListRoomMembers を別途叩く。
}

message RoomMember {
  string user_id = 1;
  google.protobuf.Timestamp joined_at = 2;
  // ListRoomMembers のレスポンスで chat-service が enrich する軽量フィールド。
  // 詳細情報 (status_text 等) は画面 #8 で GetUser(user_id) を叩いて取る。
  string display_name = 3;
  string avatar_url = 4;
}

message CreateRoomRequest {
  string name = 1;
}

message CreateRoomResponse {
  Room room = 1;
}

message GetRoomRequest {
  string room_id = 1;
}

message GetRoomResponse {
  Room room = 1;
}

message ListRoomsRequest {
  int32 limit = 1;
  string cursor = 2;
}

message ListRoomsResponse {
  repeated Room rooms = 1;
  string next_cursor = 2;
}

message SearchRoomsRequest {
  string query = 1;
  int32 limit = 2;
  string cursor = 3;
}

message SearchRoomsResponse {
  repeated Room rooms = 1;
  string next_cursor = 2;
}

message JoinRoomRequest {
  string room_id = 1;
}

message JoinRoomResponse {}

message LeaveRoomRequest {
  string room_id = 1;
}

message LeaveRoomResponse {}

message ListRoomMembersRequest {
  string room_id = 1;
  int32 limit = 2;
  string cursor = 3;
}

message ListRoomMembersResponse {
  repeated RoomMember members = 1;
  string next_cursor = 2;
}

message Message {
  string id = 1;
  string room_id = 2;
  string sender_id = 3;
  string content = 4;
  google.protobuf.Timestamp created_at = 5;
}

message SendMessageRequest {
  string room_id = 1;
  // sender_id は realtime-service から渡される。
  // chat-service 側で x-user-id (= 認証済みユーザー) との一致を検証する。
  string sender_id = 2;
  string content = 3;
}

message SendMessageResponse {
  Message message = 1;
}

message GetMessagesRequest {
  string room_id = 1;
  // limit が 0 / 未指定の時はサーバー側でデフォルトを当てる。
  int32 limit = 2;
  // cursor は前回レスポンスの next_cursor をそのまま渡す (created_at + id をエンコードした不透明値)。
  string cursor = 3;
}

message GetMessagesResponse {
  // created_at の降順 (新しいもの順)。
  repeated Message messages = 1;
  // 続きがある時のみ非空。空文字なら末尾。
  string next_cursor = 2;
}
